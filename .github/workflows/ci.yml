name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest tests/ -q
      - name: Smoke test the CLI (pin succeeds, clean verify passes, drift exits 1)
        run: |
          set -e
          mcppin --store /tmp/pins.json pin demo tests/fixtures/tools.json
          mcppin --store /tmp/pins.json verify demo tests/fixtures/tools.json
          # tamper a description and confirm verify reports drift (exit 1)
          python -c "import json,pathlib; p=pathlib.Path('tests/fixtures/tools.json'); d=json.loads(p.read_text()); d['tools'][0]['description']='POISONED'; pathlib.Path('/tmp/poisoned.json').write_text(json.dumps(d))"
          if mcppin --store /tmp/pins.json verify demo /tmp/poisoned.json; then
            echo "expected drift to be detected" && exit 1
          fi
